<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <meta name="description" content="Carnevale Intercomunale 2025 – Estrazione a premi. Numeri da 0001 a 4000.">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="./img/favicon_CI26.png">
    <link rel="apple-touch-icon" href="./img/favicon_CI26.png">
    <title>Carnevale Intercomunale 2026 – Estrazione</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="homepage">
        <img src="./img/logo_carnevale2026.svg" class="logo-index" alt="Logo Carnevale Intercomunale 2025">

        <div class="ticket-counter">
            <span class="dot"></span>
            <span><span class="no-phone">4.000</span> biglietti in palio</span>
        </div>

        <a class="cta" href="estrazione1.html">
            Vai all'estrazione
            <ion-icon name="chevron-forward-outline"></ion-icon>
        </a>

        <button id="resetBtn" style="
            margin-top: 2rem;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255);
            border-radius: 50px;
            padding: 8px 20px;
            font-size: 0.75rem;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            letter-spacing: 0.04em;
        ">↺ Reset estrazioni</button>
    </div>

    <footer>
        <p class="credit-text">Carnevale Intercomunale 2026</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-cookie/3.0.1/js.cookie.min.js"></script>
    <script src="script.js" defer></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
